name: Token Budget

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  count-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Count tokens
        run: scripts/count-tokens.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
